<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Upper Bouncing Text -->
    <div class="title-text" >
      <!-- Left Flower -->
    <div class="text-flower flower-left">
      <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
        <div class="petal p4"></div><div class="petal p5"></div>
        <div class="flower-center"></div>
    </div>    
        <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
       
        <!-- Right Flower -->
    <div class="text-flower flower-right">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
        <div class="petal p4"></div><div class="petal p5"></div>
        <div class="flower-center"></div>
    </div>   
    </div>


    <!-- Cake dropping tier by tier -->
    <div class="cake-container">
        <!-- Bottom Tier -->
        <div class="tier tier-bottom">
            <div class="icing"></div>          
        </div>    
                   <!-- Middle Tier -->
        <div class="tier tier-middle">
            <div class="icing"></div>
        </div>
              <!-- Top Tier -->
        <div class="tier tier-top">
            <div class="icing"></div>
                      <!-- Candle on top tier -->
        <div class="candle">
            <div class="candle-flame"></div>
        </div>
        </div>
      
      <div class="cake-plate"></div>
    </div>
  
<!-- Lower Bouncing Text (Birthday) -->
<div class="title-text" style="top: 75%;">
    <!-- Left Flower -->
    <div class="text-flower flower-left">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
        <div class="petal p4"></div><div class="petal p5"></div>
        <div class="flower-center"></div>
    </div>

    <!-- The Text Letters -->
    <span>B</span><span>i</span><span>r</span><span>t</span><span>h</span><span>d</span><span>a</span><span>y</span>

    <!-- Right Flower -->
    <div class="text-flower flower-right">
        <div class="petal p1"></div><div class="petal p2"></div><div class="petal p3"></div>
        <div class="petal p4"></div><div class="petal p5"></div>
        <div class="flower-center"></div>
    </div>
</div>

</body>
</html>
